<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bathos — experiment catalog</title>
  <style>[x-cloak] { display: none !important; }</style>
  <style>{{ pico_css | safe }}</style>
  <style>
    :root {
      --bathos-nav-bg: #1a1a2e;
      --bathos-nav-fg: #e2e8f0;
      --bathos-nav-accent: #63b3ed;
      --bathos-badge-radius: 0.25rem;
    }
    body { margin: 0; }
    .bathos-nav {
      background: var(--bathos-nav-bg);
      color: var(--bathos-nav-fg);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .bathos-nav .brand {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      color: var(--bathos-nav-fg);
      text-decoration: none;
    }
    .bathos-nav nav { display: flex; gap: 1.25rem; }
    .bathos-nav nav a {
      color: var(--bathos-nav-fg);
      text-decoration: none;
      opacity: 0.75;
      font-size: 0.95rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .bathos-nav nav a:hover,
    .bathos-nav nav a.active {
      opacity: 1;
      background: rgba(255,255,255,0.1);
    }
    .bathos-main { padding: 1.5rem; }
    .cool-banner {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 0.375rem;
      padding: 0.625rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      color: #92400e;
    }
    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: var(--bathos-badge-radius);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-green  { background: #d1fae5; color: #065f46; }
    .badge-red    { background: #fee2e2; color: #991b1b; }
    .badge-orange { background: #ffedd5; color: #9a3412; }
    .badge-gray   { background: #f3f4f6; color: #374151; }
    .badge-yellow { background: #fef9c3; color: #713f12; }
    .detail-row td { background: #f9fafb; }
    .detail-panel { padding: 0.75rem 1rem; }
    .detail-panel h4 { margin: 0.5rem 0 0.25rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7280; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 0.75rem; }
    .detail-section { background: white; border: 1px solid #e5e7eb; border-radius: 0.375rem; padding: 0.75rem 1rem; }
    .detail-kv { display: flex; flex-direction: column; gap: 0.25rem; }
    .detail-kv dt { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: #9ca3af; margin: 0; }
    .detail-kv dd { font-size: 0.875rem; color: #111827; margin: 0; word-break: break-all; font-family: monospace; }
    .output-list { margin: 0; padding-left: 1rem; font-size: 0.8rem; font-family: monospace; }
    tr.run-row { cursor: pointer; }
    tr.run-row:hover td { background: #f0f9ff; }
    .large-table-notice {
      background: #eff6ff;
      border: 1px solid #93c5fd;
      border-radius: 0.375rem;
      padding: 0.5rem 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      color: #1e40af;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #6b7280;
    }
    .empty-state h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .empty-state code { background: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid #e5e7eb; color: #374151; font-weight: 600; white-space: nowrap; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
    .font-mono { font-family: monospace; }
    @media (max-width: 640px) {
      .bathos-nav { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .bathos-main { padding: 0.75rem; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body x-data="bathosApp()" x-init="init()">

  <header class="bathos-nav">
    <a href="#" class="brand">bathos</a>
    <nav>
      <a :class="{ active: currentView === 'runs' }"
         @click.prevent="currentView = 'runs'">Runs</a>
      <a :class="{ active: currentView === 'campaigns' }"
         @click.prevent="currentView = 'campaigns'">Campaigns</a>
    </nav>
  </header>

  <main class="bathos-main">
    {% if catalog_state == 'cool' %}
    <div class="cool-banner">
      Viewing cool-tier data — some fields may be absent.
      Run <code>bth compact</code> for the full catalog.
    </div>
    {% endif %}

    <div x-show="currentView === 'runs'" x-cloak>
      {% include '_runs.html' %}
    </div>

    <div x-show="currentView === 'campaigns'" x-cloak>
      {% include '_campaign.html' %}
    </div>
  </main>

  <script>{{ alpine_js | safe }}</script>
  <script>
    function bathosApp() {
      return {
        currentView: 'runs',
        expandedRuns: {},
        expandedCampaigns: {},
        init() {
          // currentView is set by nav links; default 'runs'
        },
        toggleRun(id) {
          this.expandedRuns[id] = !this.expandedRuns[id];
        },
        toggleCampaign(id) {
          this.expandedCampaigns[id] = !this.expandedCampaigns[id];
        }
      };
    }
  </script>
</body>
</html>
