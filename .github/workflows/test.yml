name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint with ruff
        run: uv run ruff check src tests
      - name: Type check with pyright
        run: uv run pyright
      - name: Run tests with coverage
        run: uv run pytest --cov=bathos --cov-report=term-missing -v
