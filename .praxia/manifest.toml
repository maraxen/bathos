[plugin]
name            = "bathos"
version         = "0.5.0"
description     = "Experiment tracking — pre-registration, provenance, campaigns"
requires_praxia = ">=1.0"
# Declares bathos as a provider of the generic praxia "readback" capability
# (praxia-plugin-readback: resolve_pin/get_trust_state/query_attestation/
# figure_lookup — all already live MCP tools on bth-mcp below, S1/S4/S7).
# Consumers resolve this via
# praxia_workflows::plugin_cli::resolve_plugin_mcp_command_for_capability
# ("readback") rather than naming "bathos" directly — see praxia backlog
# #3499 / PR maraxen/praxia#22.
provides = ["readback"]

[plugin.mcp]
# `bth serve` never existed as a CLI subcommand — the real MCP launch
# mechanism is the `bth-mcp` console-script entry point (pyproject.toml
# [project.scripts]), which starts bathos.mcp:mcp_server() on stdio
# transport. bathos.export.register_mcp() resolves the same binary
# (shutil.which("bth-mcp"), falling back to `uv run --with bathos[mcp]
# bth-mcp`) when writing mcpServers.bathos into a caller's MCP config.
# Fixed as part of debt #619 (MCP write-seam auth hardening).
command = ["bth-mcp"]

[[plugin.skills]]
name     = "using-bathos"
path     = "agent_assets/skills/using-bathos/SKILL.md"
triggers = ["bth run", "sidecar", "campaign", "experiment", "bth check"]

[[plugin.snippets]]
name           = "bathos-rules"
path           = "agent_assets/snippets/rules.md"
scope          = "project"
scope_detector = "glob:scripts/**/*.bth.toml"

[[plugin.agents]]
name  = "experiment-runner"
path  = "agent_assets/agents/experiment-runner.md"
tools = ["run", "campaign_create", "campaign_review", "check"]

[plugin.dependencies]
myxcel = ">=0.3"

[plugin.export_command]
claude_code = ["bth", "export", "--surface", "claude_code", "--level", "user"]
