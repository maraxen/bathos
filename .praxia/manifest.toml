[plugin]
name            = "bathos"
version         = "0.5.0"
description     = "Experiment tracking — pre-registration, provenance, campaigns"
requires_praxia = ">=1.0"

[plugin.mcp]
command = ["bth", "serve"]

[[plugin.skills]]
name     = "using-bathos"
path     = "agent_assets/skills/using-bathos/SKILL.md"
triggers = ["bth run", "sidecar", "campaign", "experiment", "bth check"]

[[plugin.snippets]]
name           = "bathos-rules"
path           = "agent_assets/snippets/rules.md"
scope          = "project"
scope_detector = "glob:scripts/**/*.bth.toml"

[[plugin.agents]]
name  = "experiment-runner"
path  = "agent_assets/agents/experiment-runner.md"
tools = ["run", "campaign_create", "campaign_review", "check"]

[plugin.dependencies]
myxcel = ">=0.3"

[plugin.export_command]
claude_code = ["bth", "export", "--surface", "claude_code", "--level", "user"]
