# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2/

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

python:
  version: "3.12"
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true

docs:
  source: docs/source
  build: docs/build

# Optional: Enable PR previews
# pull_request_builds: true
